<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典扫雷 - 极速双击版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #c0c0c0; /* 经典Win95灰 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none; /* 禁止选中文本 */
            -webkit-user-select: none;
        }

        /* 3D 边框效果工具类 */
        .inset { border: 2px solid; border-color: #808080 #fff #fff #808080; }
        .outset { border: 2px solid; border-color: #fff #808080 #808080 #fff; }

        .game-window {
            background: #c0c0c0;
            padding: 6px;
            display: inline-block;
        }

        /* 顶部栏：包含计数器和笑脸 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            margin-bottom: 6px;
            background: #c0c0c0;
        }

        .counter {
            background: #000;
            color: #f00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 26px;
            line-height: 26px;
            width: 50px;
            text-align: center;
            font-weight: bold;
        }

        #face-btn {
            width: 36px;
            height: 36px;
            font-size: 20px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            background: #c0c0c0;
            outline: none;
            padding: 0;
            border: 2px solid; 
            border-color: #fff #808080 #808080 #fff;
        }
        #face-btn:active { 
            border-width: 2px; 
            border-style: solid; 
            border-color: #808080 #fff #fff #808080; 
            transform: translateY(1px); 
        }

        /* 游戏区域 */
        #grid {
            display: grid;
            background: #808080; /* 格子之间的线 */
            gap: 0; 
        }

        .cell {
            width: 24px;
            height: 24px;
            line-height: 22px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Verdana', sans-serif;
            cursor: default;
            box-sizing: border-box;
        }

        /* 未点开的状态 (凸起) */
        .cell.closed {
            background: #c0c0c0;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
        }
        
        /* 点开后的状态 (平整/凹陷) */
        .cell.revealed {
            background: #c0c0c0;
            border: 1px dotted #808080; /* 淡淡的虚线边界 */
            border-top: none; 
            border-left: none;
        }

        .cell.mine { background: #ff0000; border: 1px solid #808080; }
        .cell.flagged { color: #ff0000; }
        .cell.mistake { background: #ffcdcd; color: #ff0000; font-weight: normal; }

        /* 数字颜色 */
        .c-1 { color: #0000ff; }
        .c-2 { color: #008000; }
        .c-3 { color: #ff0000; }
        .c-4 { color: #000080; }
        .c-5 { color: #800000; }
        .c-6 { color: #008080; }
        .c-7 { color: #000000; }
        .c-8 { color: #808080; }

        /* 难度选择菜单 */
        .menu { margin-bottom: 15px; }
        .menu button { margin: 0 5px; padding: 5px 10px; cursor: pointer; border: 1px solid #888; background: #eee;}
        .menu button.active { font-weight: bold; background: #bbb; border: 1px inset #888; }

        a.back { display: block; margin-top: 15px; color: #555; text-decoration: none; font-size: 12px; }
        
        /* 提示文字 */
        .hint { font-size: 12px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="menu">
        <button onclick="setDifficulty('easy')" id="btn-easy">初级</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">中级</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">高级</button>
    </div>

    <div class="hint">💡 提示：双击数字可快速翻开周围格子</div>

    <div class="game-window outset">
        <div class="header inset">
            <div class="counter inset" id="mines-left">000</div>
            <button id="face-btn" onclick="initGame()">🙂</button>
            <div class="counter inset" id="timer">000</div>
        </div>

        <div class="inset">
            <div id="grid"></div>
        </div>
    </div>

    <a href="/" class="back">← 返回菜单</a>

    <script>
        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let config = difficulties.easy;
        let grid = [];
        let gameOver = false;
        let flags = 0;
        let revealed = 0;
        let timerInterval;
        let time = 0;
        let firstClick = true;

        const faceBtn = document.getElementById('face-btn');
        const gridEl = document.getElementById('grid');
        const minesLeftEl = document.getElementById('mines-left');
        const timerEl = document.getElementById('timer');

        function setDifficulty(level) {
            config = difficulties[level];
            document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            initGame();
        }

        function initGame() {
            gameOver = false;
            flags = 0;
            revealed = 0;
            time = 0;
            firstClick = true;
            grid = [];
            
            clearInterval(timerInterval);
            timerEl.innerText = "000";
            updateMinesCounter();
            faceBtn.innerText = "🙂";
            
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 24px)`;
            gridEl.style.gridTemplateRows = `repeat(${config.rows}, 24px)`;

            for(let i=0; i<config.rows * config.cols; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell closed';
                cell.dataset.index = i;
                
                // 1. 鼠标按下效果
                cell.addEventListener('mousedown', (e) => {
                    if(!gameOver && e.button === 0) faceBtn.innerText = "😮";
                });
                
                // 2. 鼠标抬起效果
                document.addEventListener('mouseup', () => {
                    if(!gameOver) faceBtn.innerText = "🙂";
                });
                
                // 3. 左键点击
                cell.onclick = () => handleClick(i);
                
                // 4. 右键点击
                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    handleRightClick(i);
                };

                // 5. 双击事件 (双键功能)
                cell.ondblclick = () => handleChord(i);

                gridEl.appendChild(cell);
                grid.push({ index: i, isMine: false, revealed: false, flagged: false, count: 0 });
            }
        }

        function placeMines(excludeIndex) {
            let minesPlaced = 0;
            const total = config.rows * config.cols;
            while(minesPlaced < config.mines) {
                let idx = Math.floor(Math.random() * total);
                // 排除当前点击位置，防止开局踩雷
                if(idx !== excludeIndex && !grid[idx].isMine) {
                    grid[idx].isMine = true;
                    minesPlaced++;
                }
            }

            // 计算周围雷数
            for(let i=0; i<total; i++) {
                if(!grid[i].isMine) {
                    let neighbors = getNeighbors(i);
                    grid[i].count = neighbors.filter(n => grid[n].isMine).length;
                }
            }

            // 启动计时
            timerInterval = setInterval(() => {
                time++;
                if(time > 999) time = 999;
                timerEl.innerText = time.toString().padStart(3, '0');
            }, 1000);
        }

        function getNeighbors(idx) {
            let neighbors = [];
            const r = Math.floor(idx / config.cols);
            const c = idx % config.cols;
            for(let i=r-1; i<=r+1; i++) {
                for(let j=c-1; j<=c+1; j++) {
                    if(i>=0 && i<config.rows && j>=0 && j<config.cols) {
                        let nIdx = i*config.cols + j;
                        if(nIdx !== idx) neighbors.push(nIdx);
                    }
                }
            }
            return neighbors;
        }

        // 左键点击逻辑
        function handleClick(idx) {
            if(gameOver || grid[idx].flagged || grid[idx].revealed) return;

            if(firstClick) {
                placeMines(idx);
                firstClick = false;
            }

            const cell = grid[idx];
            const el = gridEl.children[idx];

            if(cell.isMine) {
                triggerGameOver(false, idx);
            } else {
                revealCell(idx);
                checkWin();
            }
        }

        // 双击清理 (Chord) 逻辑
        function handleChord(idx) {
            if(gameOver) return;
            const cell = grid[idx];

            // 只有已翻开且有数字的格子才能双击
            if(!cell.revealed || cell.count === 0) return;

            const neighbors = getNeighbors(idx);
            
            // 计算周围插旗的数量
            const surroundingFlags = neighbors.filter(n => grid[n].flagged).length;

            // 如果插旗数量等于雷数，自动翻开其余格子
            if(surroundingFlags === cell.count) {
                let hitMine = false;
                neighbors.forEach(n => {
                    if(!grid[n].revealed && !grid[n].flagged) {
                        if(grid[n].isMine) {
                            hitMine = true; // 插错旗了，引爆！
                            triggerGameOver(false, n);
                        } else {
                            revealCell(n);
                        }
                    }
                });
                if(!hitMine) checkWin();
            }
        }

        function revealCell(idx) {
            if(grid[idx].revealed || grid[idx].flagged) return;
            
            grid[idx].revealed = true;
            revealed++;
            
            const el = gridEl.children[idx];
            el.className = 'cell revealed';
            
            if(grid[idx].count > 0) {
                el.classList.add(`c-${grid[idx].count}`);
                el.innerText = grid[idx].count;
            } else {
                // 如果是空地，连锁反应
                let neighbors = getNeighbors(idx);
                neighbors.forEach(n => revealCell(n));
            }
        }

        function handleRightClick(idx) {
            if(gameOver || grid[idx].revealed) return;
            
            const cell = grid[idx];
            const el = gridEl.children[idx];

            if(cell.flagged) {
                cell.flagged = false;
                flags--;
                el.innerText = '';
                el.classList.remove('flagged');
            } else {
                cell.flagged = true;
                flags++;
                el.innerText = '🚩';
                el.classList.add('flagged');
            }
            updateMinesCounter();
        }

        function triggerGameOver(isWin, hitMineIdx) {
            gameOver = true;
            clearInterval(timerInterval);

            if(isWin) {
                faceBtn.innerText = "😎";
                minesLeftEl.innerText = "000";
                // 胜利时把剩余雷全标旗
                grid.forEach(c => {
                    if(c.isMine && !c.flagged) {
                        const el = gridEl.children[c.index];
                        el.innerText = '🚩';
                        el.classList.add('flagged');
                    }
                });
            } else {
                faceBtn.innerText = "😵";
                // 失败时显示所有雷
                grid.forEach(c => {
                    const el = gridEl.children[c.index];
                    if(c.isMine) {
                        if(!c.flagged) {
                            el.classList.remove('closed');
                            el.classList.add('revealed', 'mine');
                            el.innerText = '💣';
                            // 红色高亮踩到的雷
                            if(c.index === hitMineIdx) {
                                el.style.backgroundColor = 'red';
                            }
                        }
                    } else if(c.flagged) {
                        // 标错的雷
                        el.classList.remove('closed');
                        el.classList.add('mistake');
                        el.innerText = '❌';
                    }
                });
            }
        }

        function checkWin() {
            if(gameOver) return;
            const total = config.rows * config.cols;
            if(revealed === total - config.mines) {
                triggerGameOver(true);
            }
        }

        function updateMinesCounter() {
            let left = config.mines - flags;
            if(left < -99) left = -99;
            minesLeftEl.innerText = left.toString().padStart(3, '0');
        }

        // 初始化
        setDifficulty('easy');

    </script>
</body>
</html>
