<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>经典扫雷</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #c0c0c0; /* 经典Win95灰 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        /* 3D 边框效果工具类 */
        .inset { border: 2px solid; border-color: #808080 #fff #fff #808080; }
        .outset { border: 2px solid; border-color: #fff #808080 #808080 #fff; }

        .game-window {
            background: #c0c0c0;
            padding: 6px;
            display: inline-block;
        }

        /* 顶部栏：包含计数器和笑脸 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            margin-bottom: 6px;
            background: #c0c0c0;
        }

        .counter {
            background: #000;
            color: #f00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 26px;
            line-height: 26px;
            width: 50px;
            text-align: center;
            font-weight: bold;
        }

        #face-btn {
            width: 36px;
            height: 36px;
            font-size: 20px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            background: #c0c0c0;
            outline: none;
            padding: 0;
        }
        #face-btn:active { border-width: 2px; border-style: solid; border-color: #808080 #fff #fff #808080; transform: translateY(1px); }

        /* 游戏区域 */
        #grid {
            display: grid;
            background: #808080; /* 格子之间的线 */
            gap: 0; /* 紧贴 */
        }

        .cell {
            width: 24px;
            height: 24px;
            line-height: 22px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Verdana', sans-serif;
            cursor: default;
            box-sizing: border-box;
        }

        /* 未点开的状态 (凸起) */
        .cell.closed {
            background: #c0c0c0;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
        }
        
        /* 点开后的状态 (平整/凹陷) */
        .cell.revealed {
            background: #c0c0c0;
            border: 1px solid #7b7b7b; /* 淡淡的边界 */
            border: none;
            outline: 1px dotted #808080;
        }

        .cell.mine { background: #ff0000; }
        .cell.flagged { color: #ff0000; }

        /* 数字颜色 */
        .c-1 { color: #0000ff; }
        .c-2 { color: #008000; }
        .c-3 { color: #ff0000; }
        .c-4 { color: #000080; }
        .c-5 { color: #800000; }
        .c-6 { color: #008080; }
        .c-7 { color: #000000; }
        .c-8 { color: #808080; }

        /* 难度选择菜单 */
        .menu { margin-bottom: 15px; }
        .menu button { margin: 0 5px; padding: 5px 10px; cursor: pointer;}
        .menu button.active { font-weight: bold; background: #ddd; }

        a.back { display: block; margin-top: 15px; color: #555; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="menu">
        <button onclick="setDifficulty('easy')" id="btn-easy">初级 (9x9)</button>
        <button onclick="setDifficulty('medium')" id="btn-medium">中级 (16x16)</button>
        <button onclick="setDifficulty('hard')" id="btn-hard">高级 (30x16)</button>
    </div>

    <div class="game-window outset">
        <div class="header inset">
            <div class="counter inset" id="mines-left">000</div>
            <button class="outset" id="face-btn" onclick="initGame()">🙂</button>
            <div class="counter inset" id="timer">000</div>
        </div>

        <div class="inset">
            <div id="grid"></div>
        </div>
    </div>

    <a href="/" class="back">← 返回菜单</a>

    <script>
        // 经典难度配置
        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let config = difficulties.easy;
        let grid = [];
        let gameOver = false;
        let flags = 0;
        let revealed = 0;
        let timerInterval;
        let time = 0;
        let firstClick = true; // 防止第一次就踩雷

        const faceBtn = document.getElementById('face-btn');
        const gridEl = document.getElementById('grid');
        const minesLeftEl = document.getElementById('mines-left');
        const timerEl = document.getElementById('timer');

        function setDifficulty(level) {
            config = difficulties[level];
            document.querySelectorAll('.menu button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${level}`).classList.add('active');
            initGame();
        }

        function initGame() {
            // 重置数据
            gameOver = false;
            flags = 0;
            revealed = 0;
            time = 0;
            firstClick = true;
            grid = [];
            
            clearInterval(timerInterval);
            timerEl.innerText = "000";
            updateMinesCounter();
            faceBtn.innerText = "🙂";
            
            // 生成网格 UI
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 24px)`;
            gridEl.style.gridTemplateRows = `repeat(${config.rows}, 24px)`;

            for(let i=0; i<config.rows * config.cols; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell closed';
                cell.dataset.index = i;
                
                // 鼠标按下效果 (模拟笑脸惊讶)
                cell.onmousedown = (e) => {
                    if(!gameOver && e.button === 0) faceBtn.innerText = "😮";
                };
                cell.onmouseup = () => {
                    if(!gameOver) faceBtn.innerText = "🙂";
                };
                
                // 点击事件
                cell.onclick = () => handleClick(i);
                cell.oncontextmenu = (e) => {
                    e.preventDefault();
                    handleRightClick(i);
                };

                gridEl.appendChild(cell);
                grid.push({ index: i, isMine: false, revealed: false, flagged: false, count: 0 });
            }
        }

        function placeMines(excludeIndex) {
            let minesPlaced = 0;
            const total = config.rows * config.cols;
            while(minesPlaced < config.mines) {
                let idx = Math.floor(Math.random() * total);
                // 第一次点击的地方及其周围不能有雷 (可选优化，这里简单处理为只要不是当前格即可)
                if(idx !== excludeIndex && !grid[idx].isMine) {
                    grid[idx].isMine = true;
                    minesPlaced++;
                }
            }

            // 计算周围雷数
            for(let i=0; i<total; i++) {
                if(!grid[i].isMine) {
                    let neighbors = getNeighbors(i);
                    grid[i].count = neighbors.filter(n => grid[n].isMine).length;
                }
            }

            // 启动计时器
            timerInterval = setInterval(() => {
                time++;
                if(time > 999) time = 999;
                timerEl.innerText = time.toString().padStart(3, '0');
            }, 1000);
        }

        function getNeighbors(idx) {
            let neighbors = [];
            const r = Math.floor(idx / config.cols);
            const c = idx % config.cols;
            for(let i=r-1; i<=r+1; i++) {
                for(let j=c-1; j<=c+1; j++) {
                    if(i>=0 && i<config.rows && j>=0 && j<config.cols) {
                        let nIdx = i*config.cols + j;
                        if(nIdx !== idx) neighbors.push(nIdx);
                    }
                }
            }
            return neighbors;
        }

        function handleClick(idx) {
            if(gameOver || grid[idx].flagged || grid[idx].revealed) return;

            // 如果是第一次点击，才开始布雷
            if(firstClick) {
                placeMines(idx);
                firstClick = false;
            }

            const cell = grid[idx];
            const el = gridEl.children[idx];

            if(cell.isMine) {
                gameOver = true;
                faceBtn.innerText = "😵"; // 挂了
                el.classList.add('mine');
                el.innerText = '💣';
                clearInterval(timerInterval);
                revealAllMines();
            } else {
                revealCell(idx);
                checkWin();
            }
        }

        function revealCell(idx) {
            if(grid[idx].revealed || grid[idx].flagged) return;
            
            grid[idx].revealed = true;
            revealed++;
            
            const el = gridEl.children[idx];
            el.className = 'cell revealed';
            
            if(grid[idx].count > 0) {
                el.classList.add(`c-${grid[idx].count}`);
                el.innerText = grid[idx].count;
            } else {
                // 空白扩散
                let neighbors = getNeighbors(idx);
                neighbors.forEach(n => revealCell(n));
            }
        }

        function handleRightClick(idx) {
            if(gameOver || grid[idx].revealed) return;
            
            const cell = grid[idx];
            const el = gridEl.children[idx];

            if(cell.flagged) {
                cell.flagged = false;
                flags--;
                el.innerText = '';
                el.classList.remove('flagged');
            } else {
                cell.flagged = true;
                flags++;
                el.innerText = '🚩';
                el.classList.add('flagged');
            }
            updateMinesCounter();
        }

        function revealAllMines() {
            grid.forEach(c => {
                if(c.isMine) {
                    const el = gridEl.children[c.index];
                    if(!c.flagged) {
                        el.classList.remove('closed');
                        el.classList.add('revealed', 'mine');
                        el.innerText = '💣';
                    }
                } else if(c.flagged) {
                    // 标错雷
                    const el = gridEl.children[c.index];
                    el.classList.remove('closed');
                    el.style.background = '#ffcdcd';
                    el.innerText = '❌';
                }
            });
        }

        function checkWin() {
            const total = config.rows * config.cols;
            if(revealed === total - config.mines) {
                gameOver = true;
                faceBtn.innerText = "😎"; // 赢了
                clearInterval(timerInterval);
                minesLeftEl.innerText = "000";
            }
        }

        function updateMinesCounter() {
            let left = config.mines - flags;
            if(left < -99) left = -99;
            minesLeftEl.innerText = left.toString().padStart(3, '0'); // 保持3位数字
        }

        // 初始化默认难度
        setDifficulty('easy');

    </script>
</body>
</html>
