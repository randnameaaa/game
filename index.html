<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏中心</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 40px; }
        .menu {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 30px;
            width: 150px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }
        .card:hover {
            transform: translateY(-5px);
            background: #3d3d3d;
            border-color: #0070f3;
        }
        .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .title { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🎮 休闲游戏中心</h1>

    <div class="menu">
        <a href="/2048/" class="card">
            <span class="icon">🔢</span>
            <span class="title">2048</span>
        </a>
        <a href="/minesweeper/" class="card">
            <span class="icon">💣</span>
            <span class="title">扫雷</span>
        </a>
    </div>

</body>
</html>
