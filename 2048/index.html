<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2048 - 简易版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: Arial; background: #faf8ef; text-align: center; touch-action: none; }
        #game-board { 
            width: 300px; height: 300px; background: #bbada0; margin: 20px auto; 
            border-radius: 5px; position: relative; 
        }
        .tile { 
            width: 65px; height: 65px; border-radius: 3px; position: absolute; 
            text-align: center; line-height: 65px; font-weight: bold; font-size: 24px;
            transition: all 0.1s ease-in-out;
        }
        .t-2 { background: #eee4da; color: #776e65; }
        .t-4 { background: #ede0c8; color: #776e65; }
        .t-8 { background: #f2b179; color: #fff; }
        .t-16 { background: #f59563; color: #fff; }
        .t-32 { background: #f67c5f; color: #fff; }
        .t-64 { background: #f65e3b; color: #fff; }
        .t-128 { background: #edcf72; color: #fff; font-size: 20px;}
        .score-container { font-size: 20px; color: #776e65; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin-top: 20px; cursor: pointer;}
        a { display: block; margin-top: 20px; color: #776e65; text-decoration: none; }
    </style>
</head>
<body>
    <div class="score-container">分数: <span id="score">0</span></div>
    <div id="game-board"></div>
    <button onclick="initGame()">重置游戏</button>
    <a href="/">← 返回菜单</a>

    <script>
        let board = [];
        let score = 0;
        const size = 4;
        
        function initGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            updateScore();
            document.getElementById('game-board').innerHTML = '';
            addNewTile();
            addNewTile();
            drawBoard();
        }

        function addNewTile() {
            let emptyTiles = [];
            for(let r=0; r<size; r++) for(let c=0; c<size; c++) if(board[r][c] === 0) emptyTiles.push({r,c});
            if(emptyTiles.length > 0) {
                let {r, c} = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                board[r][c] = Math.random() > 0.9 ? 4 : 2;
            }
        }

        function drawBoard() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(board[r][c] !== 0) {
                        let tile = document.createElement('div');
                        tile.className = `tile t-${board[r][c]}`;
                        tile.textContent = board[r][c];
                        tile.style.top = (10 + r * 75) + 'px';
                        tile.style.left = (10 + c * 75) + 'px';
                        container.appendChild(tile);
                    }
                }
            }
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = size - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < size - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    row[i + 1] = 0;
                    score += row[i];
                }
            }
            return row;
        }

        function moveRight() { move(r => { let newR = slide(r.reverse()); combine(newR); return slide(newR).reverse(); }); }
        function moveLeft() { move(r => { let newR = slide(r); combine(newR); return slide(newR); }); }
        
        function move(operate) {
            let oldBoard = JSON.stringify(board);
            for (let r = 0; r < size; r++) board[r] = operate(board[r]);
            if (oldBoard !== JSON.stringify(board)) {
                addNewTile();
                drawBoard();
                updateScore();
            }
        }
        
        function moveUp() { 
            let oldBoard = JSON.stringify(board);
            board = transpose(board);
            for (let r = 0; r < size; r++) { let newR = slide(board[r]); combine(newR); board[r] = slide(newR); }
            board = transpose(board);
            if (oldBoard !== JSON.stringify(board)) { addNewTile(); drawBoard(); updateScore(); }
        }

        function moveDown() {
            let oldBoard = JSON.stringify(board);
            board = transpose(board);
            for (let r = 0; r < size; r++) { let newR = slide(board[r].reverse()); combine(newR); board[r] = slide(newR).reverse(); }
            board = transpose(board);
            if (oldBoard !== JSON.stringify(board)) { addNewTile(); drawBoard(); updateScore(); }
        }

        function transpose(matrix) { return matrix[0].map((col, i) => matrix.map(row => row[i])); }
        function updateScore() { document.getElementById('score').innerText = score; }

        document.addEventListener('keydown', (e) => {
            if(e.key === "ArrowLeft") moveLeft();
            else if(e.key === "ArrowRight") moveRight();
            else if(e.key === "ArrowUp") moveUp();
            else if(e.key === "ArrowDown") moveDown();
        });

        initGame();
    </script>
</body>
</html>
