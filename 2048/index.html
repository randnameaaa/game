<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2048 - 终极修复版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background: #faf8ef;
            color: #776e65;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; touch-action: none;
        }

        h1 { margin: 0; font-size: 60px; }
        .header { display: flex; justify-content: space-between; width: 300px; align-items: center; margin-bottom: 20px;}
        .score-box { background: #bbada0; color: white; padding: 5px 10px; border-radius: 3px; font-weight: bold; min-width: 60px; text-align: center;}
        .score-title { font-size: 10px; text-transform: uppercase; display: block; color: #eee4da; }
        
        button {
            background: #8f7a66; color: white; border: none; padding: 10px 20px; border-radius: 3px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }

        #game-container {
            width: 320px; height: 320px; background: #bbada0; border-radius: 6px;
            position: relative; padding: 10px; box-sizing: border-box;
        }

        .grid-cell {
            width: 65px; height: 65px; background: rgba(238, 228, 218, 0.35);
            border-radius: 3px; position: absolute;
        }

        /* --- 核心修复：父子分离 --- */

        /* 1. 父元素：只负责位置和移动动画 */
        .tile {
            position: absolute;
            width: 65px; height: 65px;
            z-index: 10;
            transition: transform 0.15s ease-in-out; /* 只有位置变化会触发这个过渡 */
        }

        /* 2. 子元素：负责颜色、数字和缩放动画 */
        .tile-inner {
            width: 100%; height: 100%;
            border-radius: 3px;
            line-height: 65px; text-align: center;
            font-weight: bold; font-size: 30px;
            background: #eee4da; color: #776e65; /* 默认颜色 */
        }

        /* 动画应用在子元素上，不会影响父元素的位置 */
        .tile-new .tile-inner { animation: pop 0.2s ease-in; }
        .tile-merged .tile-inner { animation: pop 0.2s ease-in; }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* 颜色配置 (应用在 tile-inner 上) */
        .tile-2 .tile-inner { background: #eee4da; color: #776e65; }
        .tile-4 .tile-inner { background: #ede0c8; color: #776e65; }
        .tile-8 .tile-inner { background: #f2b179; color: #f9f6f2; }
        .tile-16 .tile-inner { background: #f59563; color: #f9f6f2; }
        .tile-32 .tile-inner { background: #f67c5f; color: #f9f6f2; }
        .tile-64 .tile-inner { background: #f65e3b; color: #f9f6f2; }
        .tile-128 .tile-inner { background: #edcf72; color: #f9f6f2; font-size: 24px; }
        .tile-256 .tile-inner { background: #edcc61; color: #f9f6f2; font-size: 24px; }
        .tile-512 .tile-inner { background: #edc850; color: #f9f6f2; font-size: 24px; }
        .tile-1024 .tile-inner { background: #edc53f; color: #f9f6f2; font-size: 18px; }
        .tile-2048 .tile-inner { background: #edc22e; color: #f9f6f2; font-size: 18px; }

        a.back { margin-top: 20px; color: #776e65; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048</h1>
        <div class="score-box">
            <span class="score-title">SCORE</span>
            <span id="score">0</span>
        </div>
        <button onclick="newGame()">重置</button>
    </div>

    <div id="game-container"></div>
    <a href="/" class="back">← 返回菜单</a>

    <script>
        const container = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const size = 4;
        const gap = 10;
        const cellSize = 65;
        
        let tiles = []; 
        let score = 0;
        let idCounter = 0;
        let isMoving = false; 

        function initBackground() {
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.style.transform = `translate(${getPos(c)}px, ${getPos(r)}px)`;
                    container.appendChild(cell);
                }
            }
        }

        function getPos(index) { return gap + index * (cellSize + gap); }

        function newGame() {
            tiles.forEach(t => t.element.remove());
            tiles = [];
            score = 0;
            scoreEl.innerText = '0';
            addRandomTile();
            addRandomTile();
        }

        function addRandomTile() {
            let available = [];
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(!tiles.find(t => t.x === c && t.y === r)) available.push({x: c, y: r});
                }
            }
            if(available.length === 0) return;
            let pos = available[Math.floor(Math.random() * available.length)];
            createTile(pos.x, pos.y, Math.random() > 0.9 ? 4 : 2);
        }

        // 修改：创建两层结构的 DOM
        function createTile(x, y, value) {
            // 1. 外层：定位
            let tile = document.createElement('div');
            tile.className = `tile tile-${value} tile-new`;
            tile.style.transform = `translate(${getPos(x)}px, ${getPos(y)}px)`;
            
            // 2. 内层：样式和内容
            let inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.innerText = value;
            
            tile.appendChild(inner);
            container.appendChild(tile);
            
            // 动画结束后移除初始化类
            setTimeout(() => tile.classList.remove('tile-new'), 200);
            
            tiles.push({ id: idCounter++, x, y, value, element: tile });
        }

        async function move(direction) {
            if(isMoving) return;
            isMoving = true;

            let vector = {x:0, y:0};
            if(direction === 'Up') vector.y = -1;
            if(direction === 'Down') vector.y = 1;
            if(direction === 'Left') vector.x = -1;
            if(direction === 'Right') vector.x = 1;

            let moved = false;
            let mergedIds = new Set();
            
            // 排序：保证移动顺序正确
            let sortedTiles = [...tiles].sort((a, b) => {
                if(vector.x === 1) return b.x - a.x; 
                if(vector.x === -1) return a.x - b.x; 
                if(vector.y === 1) return b.y - a.y; 
                if(vector.y === -1) return a.y - b.y; 
                return 0;
            });

            // 1. 计算目标位置
            sortedTiles.forEach(tile => {
                let cell = {x: tile.x, y: tile.y};
                let next;
                
                while(true) {
                    next = {x: cell.x + vector.x, y: cell.y + vector.y};
                    if(next.x < 0 || next.x >= size || next.y < 0 || next.y >= size) break;
                    
                    let obstacle = tiles.find(t => t.x === next.x && t.y === next.y && !t.toBeDeleted);
                    
                    if(obstacle) {
                        if(obstacle.value === tile.value && !mergedIds.has(obstacle.id) && !mergedIds.has(tile.id)) {
                            // 合并
                            tile.x = next.x;
                            tile.y = next.y;
                            tile.toBeDeleted = true; 
                            
                            obstacle.value *= 2; 
                            obstacle.justMerged = true; 
                            
                            mergedIds.add(obstacle.id); 
                            mergedIds.add(tile.id);
                            score += obstacle.value;
                            moved = true;
                        }
                        break; 
                    }
                    
                    cell = next;
                    tile.x = cell.x;
                    tile.y = cell.y;
                    moved = true;
                }
            });

            if(moved) {
                // 2. 执行位移 (只改变父元素位置，内层不动)
                tiles.forEach(t => {
                    t.element.style.transform = `translate(${getPos(t.x)}px, ${getPos(t.y)}px)`;
                });
                scoreEl.innerText = score;

                // 3. 等待位移动画
                await new Promise(r => setTimeout(r, 150));

                // 4. 更新 DOM
                tiles = tiles.filter(t => {
                    if(t.toBeDeleted) {
                        t.element.remove();
                        return false;
                    }
                    return true;
                });

                tiles.forEach(t => {
                    if(t.justMerged) {
                        // 更新数值
                        let inner = t.element.querySelector('.tile-inner');
                        inner.innerText = t.value;
                        
                        // 更新外层类名以匹配颜色，并添加合并动画类
                        t.element.className = `tile tile-${t.value} tile-merged`;
                        
                        t.justMerged = false;
                        setTimeout(() => t.element.classList.remove('tile-merged'), 200);
                    }
                });

                addRandomTile();
            }
            
            isMoving = false;
        }

        document.addEventListener('keydown', (e) => {
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
                move(e.key.replace('Arrow', ''));
            }
        });

        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            if(!touchStartX || !touchStartY) return;
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) move(dx > 0 ? 'Right' : 'Left');
            else if(Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 30) move(dy > 0 ? 'Down' : 'Up');
            touchStartX = null; touchStartY = null;
            e.preventDefault();
        }, {passive: false});

        initBackground();
        newGame();
    </script>
</body>
</html>
